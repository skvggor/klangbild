services:
  klangbild-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klangbild-landing
    restart: unless-stopped
    networks:
      - caddy_net
    labels:
      caddy: klangbild.skvggor.dev
      caddy.reverse_proxy: "{{upstreams 3004}}"
      caddy.encode: "gzip"
    expose:
      - 3004

networks:
  caddy_net:
    external: true
